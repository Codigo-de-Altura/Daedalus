name: Site

# Build and publish the marketing + documentation single-page app to GitHub
# Pages. The site (web/) renders the manual authored in docs/, so a change to
# either rebuilds and redeploys. Supersedes the old mkdocs pipeline.
on:
  push:
    branches: [main]
    paths:
      - web/**
      - docs/**
      - .github/workflows/pages.yml
  workflow_dispatch:

# Minimal permissions required to publish to GitHub Pages.
permissions:
  contents: read
  pages: write
  id-token: write

# Allow only one concurrent deploy; cancel in-progress runs so the latest wins.
concurrency:
  group: pages
  cancel-in-progress: true

jobs:
  build:
    name: Build site
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Set up Node
        uses: actions/setup-node@v4
        with:
          node-version: "20"
          cache: npm
          cache-dependency-path: web/package-lock.json

      - name: Install dependencies
        working-directory: web
        run: npm ci

      - name: Build
        working-directory: web
        # VITE_BASE matches the project Pages path (https://<org>.github.io/Daedalus/).
        # Set it to "/" here if the site moves to a custom domain.
        env:
          VITE_BASE: /Daedalus/
        run: npm run build

      - name: Configure Pages
        uses: actions/configure-pages@v5

      - name: Upload Pages artifact
        uses: actions/upload-pages-artifact@v3
        with:
          path: web/dist

  deploy:
    name: Deploy to GitHub Pages
    needs: build
    runs-on: ubuntu-latest
    environment:
      name: github-pages
      url: ${{ steps.deployment.outputs.page_url }}
    steps:
      - name: Deploy to GitHub Pages
        id: deployment
        uses: actions/deploy-pages@v4
