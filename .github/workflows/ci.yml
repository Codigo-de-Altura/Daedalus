name: CI

on:
  push:
    branches: [main]
  pull_request:

jobs:
  build-test-lint:
    name: Build, test & lint
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Set up Go
        uses: actions/setup-go@v5
        with:
          # Keep in sync with the `go` directive in go.mod (reproducibility).
          go-version: '1.23'
          cache: true

      - name: Build
        run: go build ./...

      - name: Test
        run: go test ./...

      # Mirrors the `lint` target in the Makefile (gofmt check + go vet) so CI
      # and local development enforce the same gate.
      - name: Lint
        run: |
          unformatted="$(gofmt -l .)"
          if [ -n "$unformatted" ]; then
            echo "gofmt needs to run on:"; echo "$unformatted"; exit 1
          fi
          go vet ./...
