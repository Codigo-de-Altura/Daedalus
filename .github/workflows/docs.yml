name: Docs

# Build and publish the user manual to GitHub Pages whenever the documentation
# or its publishing scaffolding changes on main. This workflow is independent
# from ci.yml (different triggers, jobs, and permissions).
on:
  push:
    branches: [main]
    paths:
      - docs/**
      - mkdocs.yml
      - docs-requirements.txt
      - .github/workflows/docs.yml
  workflow_dispatch:

# Minimal permissions required to publish to GitHub Pages.
permissions:
  contents: read
  pages: write
  id-token: write

# Allow only one concurrent deploy; cancel in-progress runs so the latest docs win.
concurrency:
  group: pages
  cancel-in-progress: true

jobs:
  build:
    name: Build site
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: '3.12'
          cache: pip
          cache-dependency-path: docs-requirements.txt

      - name: Install pinned tooling
        run: pip install -r docs-requirements.txt

      - name: Build site (strict)
        run: mkdocs build --strict

      - name: Configure Pages
        uses: actions/configure-pages@v5

      - name: Upload Pages artifact
        uses: actions/upload-pages-artifact@v3
        with:
          path: site

  deploy:
    name: Deploy to GitHub Pages
    needs: build
    runs-on: ubuntu-latest
    environment:
      name: github-pages
      url: ${{ steps.deployment.outputs.page_url }}
    steps:
      - name: Deploy to GitHub Pages
        id: deployment
        uses: actions/deploy-pages@v4
