<!doctype html>
<html lang="en" class="dark">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <meta name="color-scheme" content="dark" />
    <meta name="theme-color" content="#0c0a09" />
    <title>Daedalus — Build your AI scaffolding once. Compile it anywhere.</title>
    <meta
      name="description"
      content="Daedalus is a lightweight TUI/CLI that designs your project's AI scaffolding — agents, prompts, DAG workflows, and an SDD backlog — backend-agnostically, then compiles it to your tool's native format."
    />
    <link rel="icon" type="image/svg+xml" href="favicon.svg" />
    <link rel="preconnect" href="https://fonts.googleapis.com" />
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin />
    <link
      href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700&family=Space+Grotesk:wght@500;600;700&family=JetBrains+Mono:wght@400;500;600&display=swap"
      rel="stylesheet"
    />
    <meta property="og:type" content="website" />
    <meta property="og:title" content="Daedalus — Build your AI scaffolding once. Compile it anywhere." />
    <meta
      property="og:description"
      content="Design agents, prompts, DAG workflows and an SDD backlog once. Daedalus compiles them to your tool's native format."
    />
    <!--
      SPA redirect restore: GitHub Pages serves 404.html for unknown paths.
      404.html encodes the requested path into the query string and bounces here;
      this snippet rewrites it back to a clean URL before React Router mounts.
      Adapted from rafgraph/spa-github-pages (MIT).
    -->
    <script>
      (function () {
        var redirect = sessionStorage.redirect;
        delete sessionStorage.redirect;
        if (redirect && redirect !== location.href) {
          history.replaceState(null, "", redirect);
        }
      })();
    </script>
  </head>
  <body>
    <div id="root"></div>
    <script type="module" src="/src/main.tsx"></script>
  </body>
</html>
